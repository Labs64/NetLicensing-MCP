name: NetLicensing MCP - Release

on:
  push:
    tags: ["v*"]   # trigger on v1.0.0, v1.2.3, etc.

jobs:
  # ── 1. Run tests before publishing ─────────────────────────────────────────
  test:
    name: Pre-publish tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  # ── 2. Publish Python package to PyPI ──────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write    # OIDC trusted publishing — no API token needed
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Hatch
        run: pip install hatch

      - name: Build package
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Requires trusted publishing configured at pypi.org for this repo

  # ── 3. Build & push Docker image to GitHub Container Registry ──────────────
  publish-docker:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 4. Publish to MCP Registry ──────────────────────────────────────────────
  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download mcp-publisher CLI
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/\
          mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Publish to MCP Registry
        run: mcp-publisher publish
        env:
          MCP_PUBLISHER_TOKEN: ${{ secrets.MCP_PUBLISHER_TOKEN }}

  # ── 5. Create GitHub Release ────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-docker]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # pip
            pip install netlicensing-mcp==${{ github.ref_name }}

            # uvx (no install needed)
            uvx netlicensing-mcp

            # Docker
            docker run -i --rm \
              -e NETLICENSING_API_KEY=your_key \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
